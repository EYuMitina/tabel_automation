<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табель практики</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #222;
    }

    .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
    }

    .top-panel {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 20px;
    }

    .top-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 16px;
    }

    label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #555;
    }

    input[type="text"], select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        background: #fff;
        font-size: 15px;
    }

    .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 15px;
        cursor: pointer;
        background: #2563eb;
        color: white;
    }

    button.secondary {
        background: #e5e7eb;
        color: #222;
    }

    .student-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 16px;
        overflow: hidden;
    }

    .student-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        cursor: pointer;
        border-bottom: 1px solid #eef0f3;
    }

    .student-title {
        flex: 1;
        min-width: 0;
    }

    .student-name-input {
        width: 100%;
        font-size: 18px;
        font-weight: 600;
        border: none;
        outline: none;
        background: transparent;
        padding: 0;
        color: #222;
    }

    .student-subtitle {
        font-size: 13px;
        color: #777;
        margin-top: 4px;
    }

    .chevron {
        font-size: 18px;
        color: #666;
        width: 28px;
        text-align: center;
        user-select: none;
    }

    .student-body {
        padding: 18px;
    }

    .collapsed .student-body {
        display: none;
    }

    .calendar-head {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 14px;
    }

    .calendar-head button {
        width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 50%;
        background: #eef2ff;
        color: #1d4ed8;
        font-size: 18px;
    }

    .calendar-title {
        min-width: 180px;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
    }

    .weekdays, .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }

    .weekdays {
        margin-bottom: 8px;
    }

    .weekday {
        text-align: center;
        font-size: 13px;
        color: #666;
        padding: 6px 0;
        font-weight: 600;
    }

    .day-cell {
        min-height: 88px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .day-cell:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.06);
    }

    .day-empty {
        background: transparent;
        border: none;
        cursor: default;
        box-shadow: none;
    }

    .day-number {
        font-size: 14px;
        color: #555;
    }

    .day-status {
        align-self: flex-start;
        min-width: 34px;
        text-align: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
    }

    .status-ya { background: #22c55e; }
    .status-n  { background: #ef4444; }
    .status-b  { background: #f59e0b; }
    .status-v  { background: #9ca3af; }

    .legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
    }

    .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    .empty-state {
        text-align: center;
        color: #777;
        padding: 30px 10px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    @media (max-width: 700px) {
        .page {
            padding: 14px;
        }

        .calendar-title {
            font-size: 18px;
            min-width: 130px;
        }

        .day-cell {
            min-height: 72px;
            padding: 6px;
        }

        .student-name-input {
            font-size: 16px;
        }
    }
</style>
</head>
<body>
<div class="page">

    <div class="top-panel">
        <div class="top-grid">
            <div>
                <label for="org">Организация</label>
                <input type="text" id="org" placeholder="Например, ООО Ромашка">
            </div>

            <div>
                <label for="group">Группа</label>
                <input type="text" id="group" placeholder="Например, КСК-313">
            </div>

            <div>
                <label for="globalMonth">Месяц</label>
                <select id="globalMonth" onchange="updateAllCalendars()">
                    <option value="0">Январь</option>
                    <option value="1">Февраль</option>
                    <option value="2">Март</option>
                    <option value="3">Апрель</option>
                    <option value="4">Май</option>
                    <option value="5">Июнь</option>
                    <option value="6">Июль</option>
                    <option value="7">Август</option>
                    <option value="8">Сентябрь</option>
                    <option value="9">Октябрь</option>
                    <option value="10">Ноябрь</option>
                    <option value="11">Декабрь</option>
                </select>
            </div>

            <div>
                <label for="globalYear">Год</label>
                <select id="globalYear" onchange="updateAllCalendars()">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button onclick="addStudent()">Добавить студента</button>
            <button onclick="generatePdfView()">Скачать табель</button>
            <button class="secondary" onclick="expandAll()">Развернуть всех</button>
            <button class="secondary" onclick="collapseAll()">Свернуть всех</button>
        </div>
    </div>

    <div id="studentsContainer"></div>

    <div id="emptyState" class="empty-state">
        Пока нет ни одного студента. Нажми «Добавить студента».
    </div>

</div>

<script>
    const monthNames = [
        "Январь", "Февраль", "Март", "Апрель",
        "Май", "Июнь", "Июль", "Август",
        "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
    ];

    const weekdayNames = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

    const statusOrder = ["Я", "Н", "Б", "В"];
    const statusClasses = {
        "Я": "status-ya",
        "Н": "status-n",
        "Б": "status-b",
        "В": "status-v"
    };

    let students = [];
    let nextStudentId = 1;

    function getSelectedMonth() {
        return parseInt(document.getElementById("globalMonth").value, 10);
    }

    function getSelectedYear() {
        return parseInt(document.getElementById("globalYear").value, 10);
    }

    function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    function getMondayFirstDay(jsDay) {
        return jsDay === 0 ? 6 : jsDay - 1;
    }

    function getDefaultStatus(year, month, day) {
        const date = new Date(year, month, day);
        const jsDay = date.getDay();
        return (jsDay === 0 || jsDay === 6) ? "В" : "Я";
    }

    function addStudent() {
        collapseAll();

        const student = {
            id: nextStudentId++,
            name: "",
            statuses: {}
        };

        students.push(student);
        renderStudents();
        openStudent(student.id);
    }

    function collapseAll() {
        document.querySelectorAll(".student-card").forEach(card => {
            card.classList.add("collapsed");
            const chevron = card.querySelector(".chevron");
            if (chevron) chevron.textContent = "▸";
        });
    }

    function expandAll() {
        document.querySelectorAll(".student-card").forEach(card => {
            card.classList.remove("collapsed");
            const chevron = card.querySelector(".chevron");
            if (chevron) chevron.textContent = "▾";
        });
    }

    function toggleStudent(id) {
        const card = document.getElementById("student-" + id);
        const chevron = card.querySelector(".chevron");
        const isCollapsed = card.classList.contains("collapsed");

        if (isCollapsed) {
            card.classList.remove("collapsed");
            chevron.textContent = "▾";
        } else {
            card.classList.add("collapsed");
            chevron.textContent = "▸";
        }
    }

    function openStudent(id) {
        const card = document.getElementById("student-" + id);
        if (!card) return;
        card.classList.remove("collapsed");
        const chevron = card.querySelector(".chevron");
        if (chevron) chevron.textContent = "▾";
    }

    function updateStudentName(id, value) {
        const student = students.find(s => s.id === id);
        if (!student) return;
        student.name = value;
        const subtitle = document.getElementById("subtitle-" + id);
        if (subtitle) {
            subtitle.textContent = value.trim() === "" ? "ФИО не указано" : "Табель заполняется";
        }
    }

    function getStatus(student, year, month, day) {
        const key = `${year}-${month + 1}-${day}`;
        return student.statuses[key] || getDefaultStatus(year, month, day);
    }

    function setNextStatus(studentId, day) {
        const student = students.find(s => s.id === studentId);
        if (!student) return;

        const year = getSelectedYear();
        const month = getSelectedMonth();
        const key = `${year}-${month + 1}-${day}`;

        const current = getStatus(student, year, month, day);
        const currentIndex = statusOrder.indexOf(current);
        const next = statusOrder[(currentIndex + 1) % statusOrder.length];

        student.statuses[key] = next;
        renderStudents();
        openStudent(studentId);
    }

    function changeMonth(delta) {
        const monthSelect = document.getElementById("globalMonth");
        const yearSelect = document.getElementById("globalYear");

        let month = parseInt(monthSelect.value, 10);
        let year = parseInt(yearSelect.value, 10);

        month += delta;

        if (month < 0) {
            month = 11;
            year--;
        } else if (month > 11) {
            month = 0;
            year++;
        }

        monthSelect.value = String(month);

        let hasYear = false;
        for (const option of yearSelect.options) {
            if (parseInt(option.value, 10) === year) {
                hasYear = true;
                break;
            }
        }

        if (!hasYear) {
            const option = document.createElement("option");
            option.value = String(year);
            option.textContent = String(year);
            yearSelect.appendChild(option);
        }

        yearSelect.value = String(year);
        updateAllCalendars();
    }

    function updateAllCalendars() {
        renderStudents();
    }

    function buildCalendar(student) {
        const year = getSelectedYear();
        const month = getSelectedMonth();
        const daysInMonth = getDaysInMonth(year, month);
        const firstDay = getMondayFirstDay(new Date(year, month, 1).getDay());

        let html = `
            <div class="calendar-head">
                <button type="button" onclick="event.stopPropagation(); changeMonth(-1)">‹</button>
                <div class="calendar-title">${monthNames[month]} ${year}</div>
                <button type="button" onclick="event.stopPropagation(); changeMonth(1)">›</button>
            </div>

            <div class="weekdays">
                ${weekdayNames.map(day => `<div class="weekday">${day}</div>`).join("")}
            </div>

            <div class="calendar-grid">
        `;

        for (let i = 0; i < firstDay; i++) {
            html += `<div class="day-cell day-empty"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const status = getStatus(student, year, month, day);
            const statusClass = statusClasses[status] || "status-v";

            html += `
                <div class="day-cell" onclick="setNextStatus(${student.id}, ${day})">
                    <div class="day-number">${day}</div>
                    <div class="day-status ${statusClass}">${status}</div>
                </div>
            `;
        }

        html += `
            </div>

            <div class="legend">
                <div class="legend-item"><span class="dot status-ya"></span> Я — явка</div>
                <div class="legend-item"><span class="dot status-n"></span> Н — неявка</div>
                <div class="legend-item"><span class="dot status-b"></span> Б — больничный</div>
                <div class="legend-item"><span class="dot status-v"></span> В — выходной</div>
            </div>
        `;

        return html;
    }

    function renderStudents() {
        const container = document.getElementById("studentsContainer");
        const emptyState = document.getElementById("emptyState");

        if (students.length === 0) {
            container.innerHTML = "";
            emptyState.style.display = "block";
            return;
        }

        emptyState.style.display = "none";

        container.innerHTML = students.map(student => `
            <div class="student-card" id="student-${student.id}">
                <div class="student-header" onclick="toggleStudent(${student.id})">
                    <div class="student-title">
                        <input
                            class="student-name-input"
                            type="text"
                            placeholder="Введите ФИО студента"
                            value="${escapeHtml(student.name)}"
                            onclick="event.stopPropagation()"
                            oninput="updateStudentName(${student.id}, this.value)"
                        >
                        <div class="student-subtitle" id="subtitle-${student.id}">
                            ${student.name.trim() === "" ? "ФИО не указано" : "Табель заполняется"}
                        </div>
                    </div>
                    <div class="chevron">▸</div>
                </div>
                <div class="student-body">
                    ${buildCalendar(student)}
                </div>
            </div>
        `).join("");
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;");
    }

    function getMonthNameGenitive(monthIndex) {
        const names = [
            "Январь", "Февраль", "Март", "Апрель",
            "Май", "Июнь", "Июль", "Август",
            "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
        ];
        return names[monthIndex];
    }

    function countAttendance(student, year, month) {
        const daysInMonth = getDaysInMonth(year, month);
        let total = 0;

        for (let day = 1; day <= daysInMonth; day++) {
            if (getStatus(student, year, month, day) === "Я") {
                total++;
            }
        }

        return total;
    }

    function validateBeforePdf() {
        const org = document.getElementById("org").value.trim();
        const group = document.getElementById("group").value.trim();

        if (!org) {
            alert("Заполните организацию.");
            return false;
        }

        if (!group) {
            alert("Заполните группу.");
            return false;
        }

        if (students.length === 0) {
            alert("Добавьте хотя бы одного студента.");
            return false;
        }

        for (const student of students) {
            if (!student.name.trim()) {
                alert("У одного из студентов не заполнено ФИО.");
                return false;
            }
        }

        return true;
    }

    function buildPrintTableRows() {
        const year = getSelectedYear();
        const month = getSelectedMonth();
        const daysInMonth = getDaysInMonth(year, month);

        return students.map((student, index) => {
            let dayCells = "";

            for (let day = 1; day <= 31; day++) {
                const isActiveDay = day <= daysInMonth;
                const status = isActiveDay ? getStatus(student, year, month, day) : "";

                dayCells += `
                    <td class="day-col ${!isActiveDay ? 'unused-day' : ''}">
                        ${status}
                    </td>
                `;
            }

            return `
                <tr>
                    <td class="num-col">${index + 1}</td>
                    <td class="fio-col">${escapeHtml(student.name)}</td>
                    ${dayCells}
                    <td class="total-col">${countAttendance(student, year, month)}</td>
                </tr>
            `;
        }).join("");
    }

    function generatePdfView() {
        if (!validateBeforePdf()) return;

        const org = document.getElementById("org").value.trim();
        const group = document.getElementById("group").value.trim();
        const month = getSelectedMonth();
        const year = getSelectedYear();
        const daysInMonth = getDaysInMonth(year, month);
        const monthName = getMonthNameGenitive(month);

        const printWindow = window.open("", "_blank");

        if (!printWindow) {
            alert("Браузер заблокировал окно печати. Разрешите всплывающие окна для этой страницы.");
            return;
        }

        const html = `
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Табель - ${escapeHtml(group)} - ${escapeHtml(monthName)} - ${year}</title>

    size: A4 landscape;

    background: #f8fafc;
    position: sticky;

    border: none;
    background: #2563eb;

}

}

.title {
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: 0.2px;
}

.subtitle {
    text-align: center;
    font-size: 17px;
    line-height: 1.15;
    margin-bottom: 4px;
}

.org-line {
    text-align: center;
    font-size: 17px;
    margin-bottom: 10px;
}

.group-line {
    text-align: center;
    font-size: 17px;
    margin-bottom: 6px;
}

    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
}

.attendance-table th,
.attendance-table td {
    border: 1px solid #000;
    font-size: 14px;
    padding: 1px 1px;
    text-align: center;
    vertical-align: middle;
    height: 19px;

    font-weight: 700;

.line-mid,

}

    width: 190px;

}

    width: 120px;
    text-align: center;
}

    width: 95px;
    text-align: center;
}

.signature-hint {
    font-size: 9px;
    color: #222;
    margin-top: 2px;
    margin-left: 40px;
    line-height: 1.1;

    display: flex;
    justify-content: flex-start;
    gap: 10px;
}

.stamp-row {
    margin-top: 18px;
    margin-left: 360px;
    font-size: 14px;
}

.signature-hint.college {
    margin-left: 210px;

    .print-controls {
        display: none !important;

    body {
        -webkit-print-color-adjust: exact;

    }

</style>
</head>
<body>
    <div class="print-controls">
        <button onclick="window.print()">Печать / Сохранить в PDF</button>
    </div>

    <div class="print-page">
        <div class="title">ТАБЕЛЬ</div>
        <div class="subtitle">учёта прохождения обучающимся производственной (по профилю специальности/преддипломной) практики в</div>
        <div class="org-line"><strong>${escapeHtml(org)}</strong></div>
        <div class="group-line">Группа <strong>${escapeHtml(group)}</strong></div>

        <table class="attendance-table">
            <thead>
                <tr>
                    <th colspan="34">Отметки о явках / неявках на практику по числам месяца</th>
                </tr>
                <tr>
                    <th colspan="34">${escapeHtml(monthName)}, ${year} г.</th>
                </tr>
                <tr>
                    <th class="num-col">№ п/п</th>
                    <th class="fio-col">ФИО</th>
                    ${Array.from({ length: 31 }, (_, i) => {
                        const day = i + 1;
                        return `<th class="day-col ${day > daysInMonth ? 'unused-day' : ''}">${day}</th>`;
                    }).join("")}
                    <th class="total-col">итог</th>
                </tr>
            </thead>
            <tbody>
                ${buildPrintTableRows()}
            </tbody>
