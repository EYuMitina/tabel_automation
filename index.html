<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Табель</title>

<style>
body { font-family: Arial; padding: 20px; }

.student {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 10px;
}

.header {
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 10px;
}

.day {
    border: 1px solid #999;
    padding: 5px;
    text-align: center;
    cursor: pointer;
}

.hidden {
    display: none;
}

</style>
</head>

<body>

<h2>Табель практики</h2>

<button onclick="addStudent()">Добавить студента</button>

<div id="students"></div>

<script>

let students = [];

function addStudent() {
    // свернуть всех
    document.querySelectorAll('.calendar').forEach(c => c.classList.add('hidden'));

    let id = students.length;

    let div = document.createElement('div');
    div.className = 'student';

    div.innerHTML = `
        <div class="header" onclick="toggle(${id})">
            <input placeholder="ФИО">
            <span>▼</span>
        </div>

        <div class="calendar" id="cal-${id}">
            ${createDays()}
        </div>
    `;

    document.getElementById('students').appendChild(div);
    students.push(div);
}

function createDays() {
    let html = '';
    for (let i = 1; i <= 31; i++) {
        html += `<div class="day" onclick="setStatus(this)">Я</div>`;
    }
    return html;
}

function toggle(id) {
    let el = document.getElementById('cal-' + id);
    el.classList.toggle('hidden');
}

function setStatus(el) {
    let states = ['Я', 'Н', 'Б', 'В'];
    let current = states.indexOf(el.innerText);
    el.innerText = states[(current + 1) % states.length];
}

</script>

</body>
</html>
