<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Табель</title>

<style>
body { font-family: Arial; padding: 20px; }

.student {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 10px;
}

.header {
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 10px;
}

.day {
    border: 1px solid #999;
    padding: 5px;
    text-align: center;
    cursor: pointer;
}

.hidden {
    display: none;
}

</style>
</head>

<body>

<h2>Табель практики</h2>

<button onclick="addStudent()">Добавить студента</button>

<div id="students"></div>

<label>Месяц
    <select id="month" onchange="updateAllCalendars()"
        <option value="0">Январь</option>
        <option value="1">Февраль</option>
        <option value="2">Март</option>
        <option value="3">Апрель</option>
        <option value="4">Май</option>
        <option value="5">Июнь</option>
        <option value="6">Июль</option>
        <option value="7">Август</option>
        <option value="8">Сентябрь</option>
        <option value="9">Октябрь</option>
        <option value="10">Ноябрь</option>
        <option value="11">Декабрь</option>
    </select>
</label>

<script>

let students = [];
let year = 2026;

function addStudent() {
    document.querySelectorAll('.calendar').forEach(c => c.classList.add('hidden'));

    let id = students.length;

    let div = document.createElement('div');
    div.className = 'student';

    div.innerHTML = `
        <div class="header" onclick="toggle(${id})">
            <input placeholder="ФИО">
            <span>▼</span>
        </div>

        <div class="calendar" id="cal-${id}">
        </div>
    `;

    document.getElementById('students').appendChild(div);
    students.push(id);

    renderCalendar(id);
}

function renderCalendar(id) {
    let month = parseInt(document.getElementById("month").value);

    let days = new Date(year, month + 1, 0).getDate();

    let html = '';

    for (let i = 1; i <= days; i++) {

        let date = new Date(year, month, i);
        let dayOfWeek = date.getDay();

        let isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

        let value = isWeekend ? 'В' : 'Я';

        html += `<div class="day" onclick="setStatus(this)">${value}<br><small>${i}</small></div>`;
    }

    document.getElementById('cal-' + id).innerHTML = html;
}

function updateAllCalendars() {
    students.forEach(id => renderCalendar(id));
}

function toggle(id) {
    let el = document.getElementById('cal-' + id);
    el.classList.toggle('hidden');
}

function setStatus(el) {
    let states = ['Я', 'Н', 'Б', 'В'];
    let current = states.indexOf(el.innerText.trim()[0]);
    let next = states[(current + 1) % states.length];

    let day = el.innerHTML.split("<br>")[1];
    el.innerHTML = next + "<br>" + day;
}

</script>

</body>
</html>
